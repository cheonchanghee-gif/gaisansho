<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミュージション 概算書作成くん</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f5f5f0; color: #2c2c2c; line-height: 1.8; padding: 24px 16px; }

  .page-title { max-width: 680px; margin: 0 auto 24px; padding: 4px 0 4px 16px; border-left: 4px solid #1a1a2e; }
  .page-title .brand { font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.25em; margin-bottom: 2px; }
  .page-title .name { font-size: 22px; font-weight: 600; color: #1a1a2e; letter-spacing: 0.08em; }

  .input-panel { max-width: 680px; margin: 0 auto 24px; background: #fff; border-radius: 4px; padding: 28px 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .input-panel h2 { font-size: 14px; font-weight: 600; color: #1a1a2e; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #1a1a2e; }
  .input-group { margin-bottom: 16px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .input-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #555; font-weight: 500; margin-bottom: 6px; }
  input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 3px; font-size: 14px; font-family: inherit; background: #fafaf7; }
  input:focus { outline: none; border-color: #1a1a2e; background: #fff; }
  .radio-group { display: flex; gap: 16px; padding: 8px 0; }
  .radio-group label { font-weight: 400; display: flex; align-items: center; gap: 6px; cursor: pointer; margin-bottom: 0; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 16px; padding: 8px 0; }
  .checkbox-group label { font-weight: 400; display: flex; align-items: center; gap: 6px; cursor: pointer; margin-bottom: 0; }

  .section-sub { font-size: 12px; color: #888; font-weight: 500; margin: 20px 0 8px; letter-spacing: 0.05em; }

  .generate-btn { width: 100%; background: #1a1a2e; color: #fff; border: none; padding: 14px; font-size: 15px; font-family: inherit; font-weight: 500; letter-spacing: 0.1em; border-radius: 3px; cursor: pointer; transition: opacity 0.2s; margin-top: 12px; }
  .generate-btn:hover { opacity: 0.85; }
  .generate-btn:active { transform: scale(0.99); }

  .result-section { display: none; }
  .result-section.active { display: block; }

  .container { max-width: 680px; margin: 0 auto; background: #fff; border-radius: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
  .header { background: #1a1a2e; color: #fff; padding: 32px 36px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 4px; }
  .header .subtitle { font-size: 15px; color: #b0b0c8; }
  .body-content { padding: 32px 36px 24px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; color: #666; padding-bottom: 16px; border-bottom: 1px solid #eee; }
  .info-row span:last-child { font-weight: 500; color: #2c2c2c; }
  .section-label { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: #1a1a2e; text-transform: uppercase; margin-bottom: 12px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  table td { padding: 9px 0; font-size: 15px; border-bottom: 1px solid #f0f0ec; }
  table td:first-child { color: #555; padding-right: 16px; }
  table td:last-child { text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .total-row { background: #f8f8f5; }
  .total-row td { padding: 14px 8px; font-size: 17px; font-weight: 700; color: #1a1a2e; }
  .divider { height: 1px; background: #ddd; margin: 8px 0 24px; }
  .external-section { background: #fafaf7; border-left: 3px solid #c8c8b8; padding: 16px 20px; margin-bottom: 24px; border-radius: 0 2px 2px 0; }
  .external-section .section-label { margin-top: 0; color: #777; }
  .ref-section { margin-bottom: 8px; }
  .notes { padding: 20px 36px 28px; background: #fafaf7; border-top: 1px solid #eee; }
  .notes p { font-size: 13px; color: #999; line-height: 1.9; }

  .save-btn-wrap { max-width: 680px; margin: 16px auto 40px; text-align: right; }
  .save-btn { background: #1a1a2e; color: #fff; border: none; padding: 12px 24px; font-size: 14px; font-family: inherit; font-weight: 500; letter-spacing: 0.05em; border-radius: 4px; cursor: pointer; transition: opacity 0.2s; }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:active { transform: scale(0.98); }
  .save-btn:disabled { opacity: 0.5; cursor: wait; }

  @media print { .save-btn-wrap, .input-panel, .page-title { display: none; } }
</style>
</head>
<body>

<div class="page-title">
  <div class="brand">MUSISION</div>
  <div class="name">概算書作成くん</div>
</div>

<div class="input-panel">
  <h2>物件情報 入力</h2>

  <div class="input-row">
    <div class="input-group">
      <label>物件名</label>
      <input type="text" id="bukken_name" placeholder="ミュージション墨田両国">
    </div>
    <div class="input-group">
      <label>号室</label>
      <input type="text" id="room_no" placeholder="301">
    </div>
  </div>

  <div class="input-row">
    <div class="input-group">
      <label>賃料（円）</label>
      <input type="number" id="chinryou" placeholder="205000">
    </div>
    <div class="input-group">
      <label>管理費（円）</label>
      <input type="number" id="kanrihi" placeholder="10000">
    </div>
  </div>

  <div class="input-row">
    <div class="input-group">
      <label>敷金（ヶ月数）</label>
      <input type="number" id="shikikin_month" value="1" step="0.5">
    </div>
    <div class="input-group">
      <label>礼金（ヶ月数）</label>
      <input type="number" id="reikin_month" value="1" step="0.5">
    </div>
  </div>

  <div class="input-row">
    <div class="input-group">
      <label>入居日</label>
      <input type="date" id="nyukyo_date">
    </div>
    <div class="input-group">
      <label>鍵交換費（円）</label>
      <input type="number" id="kagi" placeholder="15000">
    </div>
  </div>

  <div class="input-group">
    <label>契約区分</label>
    <div class="radio-group">
      <label><input type="radio" name="keiyaku" value="直付け" checked> 直付け（通常）</label>
      <label><input type="radio" name="keiyaku" value="直付け半額"> 直付け（賃料×0.55）</label>
      <label><input type="radio" name="keiyaku" value="業付け"> 業付け</label>
    </div>
  </div>

  <div class="section-sub">付帯設備（利用する設備の月額を入力）</div>
  <div class="input-row-3">
    <div class="input-group">
      <label>駐輪場代（円/月）</label>
      <input type="number" id="churinjo" placeholder="0">
    </div>
    <div class="input-group">
      <label>駐車場代（円/月）</label>
      <input type="number" id="chushajo" placeholder="0">
    </div>
    <div class="input-group">
      <label>バイク置場代（円/月）</label>
      <input type="number" id="baiku" placeholder="0">
    </div>
  </div>

  <div class="section-sub">オプション項目</div>
  <div class="checkbox-group">
    <label><input type="checkbox" id="chonaikaihi"> 町内会費あり（1ヶ月200円・当月＋翌月で400円）</label>
    <label><input type="checkbox" id="glass_chk"> ガラス保証料あり（10,000円・川越/志木のみ）</label>
  </div>

  <button class="generate-btn" onclick="generate()">概算書を生成</button>
</div>

<div class="result-section" id="result">
  <div class="container" id="capture-target">
    <div class="header">
      <h1>初期費用概算書</h1>
      <div class="subtitle" id="out_bukken">物件名 号室</div>
    </div>
    <div class="body-content">
      <div class="info-row">
        <span>入居日</span>
        <span id="out_nyukyo">年月日</span>
      </div>
      <div class="section-label">弊社へのお支払い</div>
      <table id="out_naibu_table"></table>
      <div class="divider"></div>
      <div class="external-section">
        <div class="section-label">弊社以外へのお支払い</div>
        <table id="out_gaibu_table"></table>
      </div>
      <div class="section-label">参考費用</div>
      <div class="ref-section">
        <table id="out_sankou_table"></table>
      </div>
    </div>
    <div class="notes">
      <p>※概算のお見積り費用となり、金額は変動する場合があります。</p>
      <p>※正式な明細書については入居審査通過後にご案内させていただきます。</p>
      <p>※ご利用の保証会社および保険会社により、金額が異なる場合がございます。</p>
      <p>※入居日、保証会社等により金額が異なる場合がございます。</p>
    </div>
  </div>
  <div class="save-btn-wrap">
    <button class="save-btn" onclick="saveAsImage()">画像として保存</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function yen(n) {
  return Math.floor(n).toLocaleString() + '円';
}

function generate() {
  const v = {
    bukken: document.getElementById('bukken_name').value || '（物件名）',
    room: document.getElementById('room_no').value || '',
    chinryou: Number(document.getElementById('chinryou').value) || 0,
    kanrihi: Number(document.getElementById('kanrihi').value) || 0,
    shikikin_m: Number(document.getElementById('shikikin_month').value) || 0,
    reikin_m: Number(document.getElementById('reikin_month').value) || 0,
    nyukyo: document.getElementById('nyukyo_date').value,
    kagi: Number(document.getElementById('kagi').value) || 0,
    keiyaku: document.querySelector('input[name="keiyaku"]:checked').value,
    churinjo: Number(document.getElementById('churinjo').value) || 0,
    chushajo: Number(document.getElementById('chushajo').value) || 0,
    baiku: Number(document.getElementById('baiku').value) || 0,
    chonaikai: document.getElementById('chonaikaihi').checked,
    glass: document.getElementById('glass_chk').checked ? 10000 : 0,
    hoshou_rate: 50
  };

  if (!v.nyukyo) {
    alert('入居日を入力してください');
    return;
  }

  const date = new Date(v.nyukyo);
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  const day = date.getDate();
  const daysInMonth = new Date(year, month, 0).getDate();
  const daysRemaining = daysInMonth - day + 1;

  const nextMonth = month === 12 ? 1 : month + 1;

  const mm = String(month).padStart(2, '0');
  const nm = String(nextMonth).padStart(2, '0');

  const chinryou_nichiwari = Math.floor(Number((v.chinryou / daysInMonth * daysRemaining).toFixed(4)));
  const kanrihi_nichiwari = Math.floor(Number((v.kanrihi / daysInMonth * daysRemaining).toFixed(4)));
  const churinjo_nichiwari = Math.floor(Number((v.churinjo / daysInMonth * daysRemaining).toFixed(4)));
  const chushajo_nichiwari = Math.floor(Number((v.chushajo / daysInMonth * daysRemaining).toFixed(4)));
  const baiku_nichiwari = Math.floor(Number((v.baiku / daysInMonth * daysRemaining).toFixed(4)));

  const shikikin = v.chinryou * v.shikikin_m;
  const reikin = v.chinryou * v.reikin_m;
  let chukai = 0;
  let chukai_rate = 0;
  if (v.keiyaku === '直付け') {
    chukai = Math.floor(Number((v.chinryou * 1.1).toFixed(4)));
    chukai_rate = 1.1;
  } else if (v.keiyaku === '直付け半額') {
    chukai = Math.floor(Number((v.chinryou * 0.55).toFixed(4)));
    chukai_rate = 0.55;
  }

  const chonaikai_fee = v.chonaikai ? 400 : 0;

  let gokei = chinryou_nichiwari + kanrihi_nichiwari + churinjo_nichiwari + chushajo_nichiwari + baiku_nichiwari
    + v.chinryou + v.kanrihi + v.churinjo + v.chushajo + v.baiku
    + shikikin + reikin + chukai + v.kagi + 15000 + 26400 + chonaikai_fee + v.glass;

  const hoshou_base = v.chinryou + v.kanrihi + v.churinjo + v.chushajo + v.baiku;
  const hoshou_initial = Math.floor(Number((hoshou_base * v.hoshou_rate / 100).toFixed(4)));
  const hoshou_monthly = Math.floor(Number((hoshou_base * 0.018).toFixed(4)));
  const getsugaku_total = v.chinryou + v.kanrihi + v.churinjo + v.chushajo + v.baiku + hoshou_monthly;

  document.getElementById('out_bukken').textContent = v.bukken + '　' + v.room + '号室';
  document.getElementById('out_nyukyo').textContent = year + '年' + month + '月' + day + '日';

  let naibu = '';
  naibu += '<tr><td>' + mm + '月分賃料 ' + daysRemaining + '日分/' + daysInMonth + '日</td><td>' + yen(chinryou_nichiwari) + '</td></tr>';
  naibu += '<tr><td>' + mm + '月分管理費 ' + daysRemaining + '日分/' + daysInMonth + '日</td><td>' + yen(kanrihi_nichiwari) + '</td></tr>';
  if (v.churinjo > 0) naibu += '<tr><td>' + mm + '月分駐輪場代 ' + daysRemaining + '日分/' + daysInMonth + '日</td><td>' + yen(churinjo_nichiwari) + '</td></tr>';
  if (v.chushajo > 0) naibu += '<tr><td>' + mm + '月分駐車場代 ' + daysRemaining + '日分/' + daysInMonth + '日</td><td>' + yen(chushajo_nichiwari) + '</td></tr>';
  if (v.baiku > 0) naibu += '<tr><td>' + mm + '月分バイク置場代 ' + daysRemaining + '日分/' + daysInMonth + '日</td><td>' + yen(baiku_nichiwari) + '</td></tr>';
  naibu += '<tr><td>' + nm + '月分賃料（満額）</td><td>' + yen(v.chinryou) + '</td></tr>';
  naibu += '<tr><td>' + nm + '月分管理費（満額）</td><td>' + yen(v.kanrihi) + '</td></tr>';
  if (v.churinjo > 0) naibu += '<tr><td>' + nm + '月分駐輪場代（満額）</td><td>' + yen(v.churinjo) + '</td></tr>';
  if (v.chushajo > 0) naibu += '<tr><td>' + nm + '月分駐車場代（満額）</td><td>' + yen(v.chushajo) + '</td></tr>';
  if (v.baiku > 0) naibu += '<tr><td>' + nm + '月分バイク置場代（満額）</td><td>' + yen(v.baiku) + '</td></tr>';
  naibu += '<tr><td>敷金（賃料の' + v.shikikin_m + 'ヶ月分）</td><td>' + yen(shikikin) + '</td></tr>';
  naibu += '<tr><td>礼金（賃料の' + v.reikin_m + 'ヶ月分）</td><td>' + yen(reikin) + '</td></tr>';
  if (chukai > 0) naibu += '<tr><td>仲介手数料（賃料の' + chukai_rate + 'ヶ月分）</td><td>' + yen(chukai) + '</td></tr>';
  naibu += '<tr><td>鍵交換費用</td><td>' + yen(v.kagi) + '</td></tr>';
  naibu += '<tr><td>24時間緊急駆けつけサービス（2年）</td><td>15,000円</td></tr>';
  naibu += '<tr><td>入居者様専用ポータル（2年）</td><td>26,400円</td></tr>';
  if (v.chonaikai) naibu += '<tr><td>町内会費（当月＋翌月）</td><td>400円</td></tr>';
  if (v.glass > 0) naibu += '<tr><td>ガラス保証料</td><td>' + yen(v.glass) + '</td></tr>';
  naibu += '<tr class="total-row"><td>合計</td><td>' + yen(gokei) + '</td></tr>';
  document.getElementById('out_naibu_table').innerHTML = naibu;

  let gaibu = '';
  gaibu += '<tr><td>初回保証料（賃料等の' + v.hoshou_rate + '%）<br><small style="color:#999">保証会社へお支払い</small></td><td>' + yen(hoshou_initial) + '</td></tr>';
  gaibu += '<tr><td>火災保険料（2年）<br><small style="color:#999">保険会社へお支払い</small></td><td>18,000円</td></tr>';
  document.getElementById('out_gaibu_table').innerHTML = gaibu;

  let sankou = '';
  sankou += '<tr><td>月額保証料（賃料等の1.8%）</td><td>' + yen(hoshou_monthly) + '</td></tr>';
  sankou += '<tr><td>月額総支払</td><td>' + yen(getsugaku_total) + '</td></tr>';

  let uchiwake_parts = [];
  uchiwake_parts.push('賃料' + v.chinryou.toLocaleString() + '円');
  uchiwake_parts.push('管理費' + v.kanrihi.toLocaleString() + '円');
  if (v.churinjo > 0) uchiwake_parts.push('駐輪場代' + v.churinjo.toLocaleString() + '円');
  if (v.chushajo > 0) uchiwake_parts.push('駐車場代' + v.chushajo.toLocaleString() + '円');
  if (v.baiku > 0) uchiwake_parts.push('バイク置場代' + v.baiku.toLocaleString() + '円');
  uchiwake_parts.push('月額保証料' + hoshou_monthly.toLocaleString() + '円');
  const uchiwake_text = '※内訳：' + uchiwake_parts.join('+');
  sankou += '<tr><td colspan="2" style="padding: 4px 0 9px; font-size: 12px; color: #999; text-align: left; border-bottom: 1px solid #f0f0ec;">' + uchiwake_text + '</td></tr>';

  document.getElementById('out_sankou_table').innerHTML = sankou;

  document.getElementById('result').classList.add('active');
  setTimeout(() => document.getElementById('result').scrollIntoView({ behavior: 'smooth' }), 100);
}

async function saveAsImage() {
  const btn = document.querySelector('.save-btn');
  const target = document.getElementById('capture-target');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const canvas = await html2canvas(target, { scale: 2, backgroundColor: '#f5f5f0', useCORS: true });
    const fileName = '初期費用概算_' + new Date().toISOString().slice(0, 10) + '.png';
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      btn.disabled = false;
      btn.textContent = '画像として保存';
    }, 'image/png');
  } catch (e) {
    alert('保存に失敗しました: ' + e.message);
    btn.disabled = false;
    btn.textContent = '画像として保存';
  }
}
</script>

</body>
</html>
